name: runtime-benchmarks

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  runtime-benchmarks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.17.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run runtime gates
        run: |
          pnpm run test
          pnpm run benchmark:runtime

      - name: Upload runtime benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-benchmark-artifacts
          path: |
            tools/benchmarks/tmp/benchmarks/runtime-only.latest.json
            tools/benchmarks/tmp/benchmarks/runtime-only.latest.md
          if-no-files-found: error
